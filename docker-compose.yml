version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # INFRAESTRUCTURA (Bases de Datos, Colas de Mensajes)
  # ---------------------------------------------------------------------------

  # PostgreSQL (Motor unificado para todos los microservicios)
  db:
    image: postgres:15-alpine
    container_name: corvus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corvus_auth_db
    ports:
      - "5433:5432" # Expuesto por conveniencia para debug local, se puede cerrar en prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - corvus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ (Broker de Mensajes para eventos asíncronos)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: corvus_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # Puerto AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: corvus_admin
      RABBITMQ_DEFAULT_PASS: corvus_secret
    volumes:
      - ../rabbitmq-config-corvus/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ../rabbitmq-config-corvus/definitions.json:/etc/rabbitmq/definitions.json
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - corvus_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MICROSERVICIOS
  # ---------------------------------------------------------------------------

  api-gateway:
    build: ../apiGateway-back-corvus
    container_name: corvus_api_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # ÚNICO PUERTO EXPUESTO PARA EL FRONTEND/MÓVIL
    env_file:
      - ../apiGateway-back-corvus/.env
    environment:
      - AUTH_URL=http://auth-service:3000
      - NOTIFICATIONS_URL=http://notifications-service:3001
      - CLUSTERING_INTEGRATOR_URL=http://clustering-integrator-service:3002
      - CLUSTERING_SUBJECT_URL=http://clustering-subject-service:3005
      - LLM_URL=http://llm-service:3003
    depends_on:
      - auth-service
      - notifications-service
      - clustering-integrator-service
      - clustering-subject-service
      - llm-service
    networks:
      - corvus_network

  auth-service:
    build: ../authentication-back-corvus
    container_name: corvus_auth_service
    restart: unless-stopped
    expose:
      - "3000" # Comunicación interna, NO ports: - "3001:3000"
    env_file:
      - ../authentication-back-corvus/.env
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/corvus_auth_db
      - RABBITMQ_URL=amqp://corvus_admin:corvus_secret@rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - corvus_network

  notifications-service:
    build: ../notifications-back-corvus
    container_name: corvus_notifications_service
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ../notifications-back-corvus/.env
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/corvus_notifications_db
      - RABBITMQ_URL=amqp://corvus_admin:corvus_secret@rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - corvus_network

  clustering-integrator-service:
    build: ../integratorProjectClustering-back-corvus
    container_name: corvus_clustering_integrator
    restart: unless-stopped
    expose:
      - "3002"
    env_file:
      - ../integratorProjectClustering-back-corvus/.env
    environment:
      - POSTGRES_DB_URL=postgresql://postgres:postgres@db:5432/corvus_clustering_integrator_db
      - PORT=3002
      - AUTH_SERVICE_URL=http://auth-service:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chroma_data_vol:/usr/src/app/chroma_data
      - ml_models_vol:/usr/src/app/app/models
      - qdrant_data_vol:/usr/src/app/qdrant_data
      - pending_projects_vol:/usr/src/app/app/pending_projects
      - clustering_config_vol:/usr/src/app/app/config
      - drafts_vol:/usr/src/app/app/drafts
    networks:
      - corvus_network

  clustering-subject-service:
    build: ../subjectMatterClustering-back-corvus
    container_name: corvus_clustering_subject
    restart: unless-stopped
    expose:
      - "3005"
    environment:
      - PORT=3005
      - LLM_SERVICE_URL=http://llm-service:3003/api/v1/llm
    depends_on:
      - llm-service
    volumes:
      - chroma_data_vol:/usr/src/app/chroma_db
    networks:
      - corvus_network

  ollama:
    image: ollama/ollama:latest
    container_name: corvus_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - corvus_network

  llm-service:
    build: ../llm-back-corvus
    container_name: corvus_llm_service
    restart: unless-stopped
    expose:
      - "3003"
    env_file:
      - ../llm-back-corvus/.env
    depends_on:
      - ollama
      - auth-service
    networks:
      - corvus_network

  admin-frontend:
    build: ../administration-front-corvus
    container_name: corvus_admin_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - corvus_network

networks:
  corvus_network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  chroma_data_vol:
  ml_models_vol:
  qdrant_data_vol:
  pending_projects_vol:
  clustering_config_vol:
  drafts_vol:
  ollama_data:
